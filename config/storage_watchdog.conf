# AI Watchdog storage/NAS config

NAS_PRIMARY_IP="10.0.0.100"
NAS_SECONDARY_IP="10.0.0.6"

# Mounted paths seen on the main server
FRIGATE_PRIMARY_DIR="/mnt/frigate_nas"
FRIGATE_SECONDARY_DIR="/mnt/frigate_backup"

HA_BACKUP_PRIMARY_DIR=""
HA_BACKUP_SECONDARY_DIR=""

NAS_PUBLIC_DIR="/mnt/nas/public"

# Freshness thresholds
# Frigate images/videos should normally be recent if cameras/events are active.
FRIGATE_FRESH_HOURS="24"

# HA backups may be daily/weekly depending on schedule.
HA_BACKUP_FRESH_DAYS="7"

# Disk warning thresholds
NAS_WARN_PERCENT="80"
NAS_CRIT_PERCENT="90"
