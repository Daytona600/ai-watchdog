# AI Watchdog Home Assistant notification config

WATCHDOG_NOTIFY_ENABLED="1"

# Send a notification even when everything is clean.
# Recommended: 0
WATCHDOG_NOTIFY_CLEAN="0"

# Treat available HA update entities as worth notifying about.
WATCHDOG_NOTIFY_UPDATES="1"

# Dismiss the old watchdog notification when the system is clean.
WATCHDOG_NOTIFY_DISMISS_WHEN_CLEAN="1"

# Persistent notification ID in Home Assistant.
WATCHDOG_NOTIFY_ID="ai_watchdog_daily_brief"

# Notification title.
WATCHDOG_NOTIFY_TITLE="AI Watchdog Brief"
