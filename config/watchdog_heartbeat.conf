# Alert if the master watchdog report is older than this.
# Daily watchdog runs at 7 AM, so 30 hours gives safe margin.
WATCHDOG_MAX_REPORT_AGE_HOURS="30"

# User systemd timer name
WATCHDOG_TIMER_NAME="ai-watchdog.timer"

# HA persistent notification id
WATCHDOG_HEARTBEAT_NOTIFICATION_ID="ai_watchdog_heartbeat_problem"
