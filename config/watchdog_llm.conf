# AI Watchdog local-LLM diagnosis config
#
# Wires the watchdog pipeline to the local Ollama / SearXNG / Qdrant
# containers already running on this Docker stack.

WATCHDOG_LLM_ENABLED="1"

# Review-only by default. The diagnose step only ever writes a draft
# runbook file under runbooks/ — it never edits other scripts, configs,
# or HA automations. There is no auto-apply mode yet.

# Container hostnames on the shared Docker network.
OLLAMA_URL="http://ollama:11434"
OLLAMA_MODEL="llama3.1:latest"
OLLAMA_EMBED_MODEL="nomic-embed-text"

SEARXNG_URL="http://searxng:8080"
# Only search the internet for problems with no existing/similar runbook.
WATCHDOG_LLM_WEB_SEARCH="1"

# Comma-separated allowlist of domains the diagnose step is allowed to use
# as web-search context for code/config fixes. Results from any other
# domain are dropped before they ever reach the model — this is enforced
# at the search-result-filtering layer, not left to the model to judge.
# Add to this list as you hit real gaps (a fix that only exists on a
# vendor forum, etc.) rather than loosening it pre-emptively.
WATCHDOG_LLM_TRUSTED_DOMAINS="github.com,docs.docker.com,docs.python.org,home-assistant.io,frigate.video,nodered.org,qdrant.tech,ollama.com,docs.searxng.org,stackoverflow.com,askubuntu.com,debian.org,archlinux.org,paho-mqtt.readthedocs.io,pypi.org"

QDRANT_URL="http://qdrant:6333"
QDRANT_COLLECTION="watchdog_incidents"
# Cosine-similarity threshold above which a past incident is reused
# instead of asking the LLM to diagnose again.
QDRANT_SIMILARITY_THRESHOLD="0.90"

# HTTP timeouts, seconds.
WATCHDOG_LLM_TIMEOUT_SEC="60"
