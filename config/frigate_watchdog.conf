# AI Watchdog Frigate camera-level config

FRIGATE_BASE_URL="http://10.0.0.35:5000"

# If a camera is wireless/solar and sometimes sleeps, we can tune later.
FRIGATE_WARN_ZERO_FPS="1"

# Snapshot endpoint test timeout seconds
FRIGATE_HTTP_TIMEOUT="8"

# Cameras allowed to show camera_fps=0 as long as snapshot endpoint works.
# Useful for solar/wireless/sleepy cameras.
FRIGATE_ALLOW_ZERO_CAMERA_FPS=""
