# AI Watchdog git auto-commit config

GIT_AUTOCOMMIT_ENABLED="1"

# Push to the remote after committing. Off by default — local commits only,
# you push manually when you're ready.
GIT_AUTOCOMMIT_PUSH="1"

# Commit author identity to record this is not a manual checkpoint.
GIT_AUTOCOMMIT_NAME="AI Watchdog"
GIT_AUTOCOMMIT_EMAIL="watchdog@localhost"
