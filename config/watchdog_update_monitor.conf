# AI Watchdog update monitoring config

# Do not run apt update here. This only reads the local package cache.
UPDATE_CHECK_APT="1"

# Number of apt upgradable package lines to show in the report.
UPDATE_APT_MAX_LINES="80"

# Treat available HA update entities as attention items.
UPDATE_HA_UPDATES_ARE_ATTENTION="0"

# Treat apt upgrades as attention items.
UPDATE_APT_UPGRADES_ARE_ATTENTION="0"

# Treat uncommitted watchdog git changes as attention items.
UPDATE_GIT_DIRTY_IS_ATTENTION="1"
